spring:
  application:
    name: jinbon-backend

  config:
    import: optional:file:.env[.properties]

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/jinbon
    username: jinbon
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  # Redis (캐시)
  data:
    redis:
      host: localhost
      port: 6380

server:
  port: 8080

# OmniOne CX (모바일 신분증 - 필수과제)
omnione:
  cx:
    server-url: ${OMNIONE_CX_URL:}  # API: 18543, 프론트 인증창: 17543
    config-path: /esign/config/config.mid.json

# OmniOne Chain (선택과제 2 - BESU)
blockchain:
  rpc-url: ${BLOCKCHAIN_RPC_URL:}
  contract-address: ${CONTRACT_ADDRESS:}
  wallet-address: ${WALLET_ADDRESS:}
  keystore-path: classpath:keystore/omnione-chain-keystore.json
  keystore-password: ${KEYSTORE_PASSWORD:}
  api-token: ${BLOCKCHAIN_API_TOKEN:}

# Open DID (선택과제 1)
opendid:
  enabled: ${OPENDID_ENABLED:true}  # false로 설정 시 VC 발급/검증을 건너뛴다 (Open DID Orchestrator 미구동 환경용)
  issuer-server-url: http://localhost:8091
  verifier-server-url: http://localhost:8092
  vc-plan-id: vcplan-jinbon-01
  issuer-did: did:omn:issuer

# JWT
jwt:
  secret: ${JWT_SECRET:}
  access-expiration: 1800000   # 30분
  refresh-expiration: 604800000  # 7일

# Logging
logging:
  level:
    com.jinbon: DEBUG
    org.hibernate.SQL: DEBUG
